<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Планка 5 мин">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111827">
  <title>Планка - таймер 5 минут</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 45%, #020617 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      padding: max(18px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
      align-items: min(100vh, 900px);
    }

    .app {
      width: min(100%, 460px);
      min-height: 720px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .header {
      text-align: center;
      padding-top: 6px;
    }

    .title {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: 0.015em;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 400;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.035));
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 22px;
      box-shadow: 0 20px 70px rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
    }

    .stage {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 400;
      white-space: nowrap;
    }

    .pill strong {
      color: var(--accent);
      font-weight: 600;
    }

    .timer-wrap {
      position: relative;
      width: min(100%, 320px);
      aspect-ratio: 1 / 1;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
    }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .circle-bg {
      fill: none;
      stroke: rgba(255,255,255,0.09);
      stroke-width: 10;
    }

    .circle-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.25s linear, stroke 0.2s ease;
    }

    .timer-text {
      text-align: center;
      z-index: 2;
    }

    .time {
      font-size: clamp(58px, 16vw, 78px);
      line-height: 0.98;
      font-weight: 650;
      letter-spacing: -0.045em;
      font-variant-numeric: tabular-nums;
    }

    .label {
      margin-top: 12px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 500;
    }

    .overall {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 20px;
      padding: 17px 14px;
      font-size: 17px;
      font-weight: 650;
      color: white;
      background: var(--panel-2);
      box-shadow: 0 10px 22px rgba(0,0,0,0.22);
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .primary {
      grid-column: span 2;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      font-size: 20px;
      padding: 20px 14px;
      font-weight: 700;
    }

    .pause {
      background: rgba(245, 158, 11, 0.9);
    }

    .reset {
      background: rgba(239, 68, 68, 0.86);
    }

    .settings {
      display: grid;
      gap: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 400;
    }

    .toggle {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--text);
    }

    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
    }

    .sequence {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .segment {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.055);
      color: var(--muted);
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }

    .segment.active {
      color: #fff;
      background: rgba(56, 189, 248, 0.22);
      border-color: rgba(56, 189, 248, 0.65);
    }

    .segment.done {
      color: rgba(255,255,255,0.72);
      background: rgba(34, 197, 94, 0.16);
      border-color: rgba(34, 197, 94, 0.5);
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
      padding: 0 10px;
      font-weight: 400;
    }

    .finished .circle-progress {
      stroke: var(--accent-2);
    }

    .paused .circle-progress {
      stroke: var(--warn);
    }

    @media (max-height: 720px) {
      body {
        align-items: flex-start;
      }
      .app {
        min-height: auto;
      }
      .timer-wrap {
        width: min(100%, 280px);
      }
      .time {
        font-size: clamp(52px, 15vw, 70px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1 class="title">Планка</h1>
      <p class="subtitle">Цикл 5:00 - сигнал после каждого отрезка</p>
    </section>

    <section class="card" id="mainCard">
      <div class="stage">
        <div class="pill">Отрезок: <strong id="segmentCounter">1 / 8</strong></div>
        <div class="pill">Всего: <strong id="totalTime">00:00 / 05:00</strong></div>
      </div>

      <div class="timer-wrap">
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <circle class="circle-bg" cx="60" cy="60" r="52"></circle>
          <circle id="progressCircle" class="circle-progress" cx="60" cy="60" r="52"></circle>
        </svg>

        <div class="timer-text">
          <div class="time" id="timeLeft">01:00</div>
          <div class="label" id="statusLabel">Готов</div>
          <div class="overall" id="overallLeft">осталось до конца: 05:00</div>
        </div>
      </div>

      <div class="buttons">
        <button class="primary" id="startBtn">СТАРТ</button>
        <button class="pause" id="pauseBtn">ПАУЗА</button>
        <button class="reset" id="resetBtn">СБРОС</button>
      </div>
    </section>

    <section class="card settings">
      <div class="row">
        <span>Звук</span>
        <label class="toggle">
          <input type="checkbox" id="soundToggle" checked>
          включён
        </label>
      </div>

      <div class="row">
        <span>Вибрация</span>
        <label class="toggle">
          <input type="checkbox" id="vibrationToggle" checked>
          включена
        </label>
      </div>

      <div class="sequence" id="sequence"></div>
    </section>

    <p class="note">
      На iPhone звук работает после нажатия «Старт». Для надёжной работы держи экран активным во время цикла.
    </p>
  </main>

  <script>
    const intervals = [60, 30, 30, 30, 30, 30, 30, 60];
    const totalDuration = intervals.reduce((sum, item) => sum + item, 0);

    const elements = {
      mainCard: document.getElementById('mainCard'),
      segmentCounter: document.getElementById('segmentCounter'),
      totalTime: document.getElementById('totalTime'),
      timeLeft: document.getElementById('timeLeft'),
      statusLabel: document.getElementById('statusLabel'),
      overallLeft: document.getElementById('overallLeft'),
      startBtn: document.getElementById('startBtn'),
      pauseBtn: document.getElementById('pauseBtn'),
      resetBtn: document.getElementById('resetBtn'),
      soundToggle: document.getElementById('soundToggle'),
      vibrationToggle: document.getElementById('vibrationToggle'),
      sequence: document.getElementById('sequence'),
      progressCircle: document.getElementById('progressCircle')
    };

    let currentSegment = 0;
    let remainingInSegment = intervals[0];
    let elapsedTotal = 0;
    let isRunning = false;
    let isFinished = false;
    let timerId = null;
    let audioContext = null;
    let wakeLock = null;

    const radius = 52;
    const circumference = 2 * Math.PI * radius;
    elements.progressCircle.style.strokeDasharray = String(circumference);
    elements.progressCircle.style.strokeDashoffset = String(circumference);

    function formatTime(seconds) {
      const safeSeconds = Math.max(0, Math.round(seconds));
      const minutes = Math.floor(safeSeconds / 60);
      const secs = safeSeconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function renderSequence() {
      elements.sequence.innerHTML = '';
      intervals.forEach((duration, index) => {
        const item = document.createElement('div');
        item.className = 'segment';
        if (index < currentSegment || (isFinished && index <= currentSegment)) {
          item.classList.add('done');
        }
        if (!isFinished && index === currentSegment) {
          item.classList.add('active');
        }
        item.textContent = `${index + 1}: ${formatTime(duration)}`;
        elements.sequence.appendChild(item);
      });
    }

    function render() {
      const segmentDuration = intervals[currentSegment] || intervals[intervals.length - 1];
      const segmentElapsed = segmentDuration - remainingInSegment;
      const progress = isFinished ? 1 : Math.min(1, Math.max(0, segmentElapsed / segmentDuration));
      const dashOffset = circumference * (1 - progress);

      elements.progressCircle.style.strokeDashoffset = String(dashOffset);
      elements.segmentCounter.textContent = `${Math.min(currentSegment + 1, intervals.length)} / ${intervals.length}`;
      elements.totalTime.textContent = `${formatTime(elapsedTotal)} / ${formatTime(totalDuration)}`;
      elements.timeLeft.textContent = formatTime(remainingInSegment);
      elements.overallLeft.textContent = `осталось до конца: ${formatTime(totalDuration - elapsedTotal)}`;

      elements.mainCard.classList.toggle('finished', isFinished);
      elements.mainCard.classList.toggle('paused', !isRunning && !isFinished && elapsedTotal > 0);

      if (isFinished) {
        elements.statusLabel.textContent = 'Готово';
        elements.startBtn.textContent = 'ПОВТОРИТЬ';
      } else if (isRunning) {
        elements.statusLabel.textContent = 'Работаем';
        elements.startBtn.textContent = 'ИДЁТ ЦИКЛ';
      } else if (elapsedTotal > 0) {
        elements.statusLabel.textContent = 'Пауза';
        elements.startBtn.textContent = 'ПРОДОЛЖИТЬ';
      } else {
        elements.statusLabel.textContent = 'Готов';
        elements.startBtn.textContent = 'СТАРТ';
      }

      renderSequence();
    }

    function ensureAudioContext() {
      if (!audioContext) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          audioContext = new AudioContextClass();
        }
      }

      if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
      }
    }

    function playTone(frequency = 880, durationMs = 120, delayMs = 0) {
      if (!elements.soundToggle.checked) return;
      ensureAudioContext();
      if (!audioContext) return;

      const startTime = audioContext.currentTime + delayMs / 1000;
      const endTime = startTime + durationMs / 1000;

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(frequency, startTime);

      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(0.18, startTime + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, endTime);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);

      oscillator.start(startTime);
      oscillator.stop(endTime + 0.03);
    }

    function signalCheckpoint() {
      playTone(920, 100, 0);
      playTone(920, 100, 180);

      if (elements.vibrationToggle.checked && 'vibrate' in navigator) {
        navigator.vibrate([90, 70, 90]);
      }
    }

    function signalFinish() {
      playTone(740, 100, 0);
      playTone(880, 100, 170);
      playTone(1040, 170, 340);

      if (elements.vibrationToggle.checked && 'vibrate' in navigator) {
        navigator.vibrate([100, 70, 100, 70, 180]);
      }
    }

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch (error) {
        wakeLock = null;
      }
    }

    async function releaseWakeLock() {
      if (!wakeLock) return;
      try {
        await wakeLock.release();
      } catch (error) {
        // Safe to ignore.
      }
      wakeLock = null;
    }

    function start() {
      ensureAudioContext();

      if (isFinished) {
        reset(false);
      }

      if (isRunning) return;

      isRunning = true;
      isFinished = false;
      requestWakeLock();
      render();

      timerId = window.setInterval(() => {
        remainingInSegment -= 1;
        elapsedTotal += 1;

        if (remainingInSegment <= 0) {
          if (currentSegment >= intervals.length - 1) {
            finish();
            return;
          }

          signalCheckpoint();
          currentSegment += 1;
          remainingInSegment = intervals[currentSegment];
        }

        render();
      }, 1000);
    }

    function pause() {
      if (!isRunning) return;
      isRunning = false;
      window.clearInterval(timerId);
      timerId = null;
      releaseWakeLock();
      render();
    }

    function reset(playReadySignal = true) {
      isRunning = false;
      isFinished = false;
      window.clearInterval(timerId);
      timerId = null;
      releaseWakeLock();

      currentSegment = 0;
      remainingInSegment = intervals[0];
      elapsedTotal = 0;

      if (playReadySignal) {
        ensureAudioContext();
      }

      render();
    }

    function finish() {
      window.clearInterval(timerId);
      timerId = null;
      isRunning = false;
      isFinished = true;
      elapsedTotal = totalDuration;
      remainingInSegment = 0;

      signalFinish();
      releaseWakeLock();
      render();
    }

    elements.startBtn.addEventListener('click', start);
    elements.pauseBtn.addEventListener('click', pause);
    elements.resetBtn.addEventListener('click', () => reset(true));

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && isRunning) {
        requestWakeLock();
      }
    });

    render();
  </script>
</body>
</html>
